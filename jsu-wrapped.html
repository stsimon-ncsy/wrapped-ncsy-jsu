<style>
/* ── Design tokens ──────────────────────────────────── */
:root {
  --magenta:  #FF2E93;
  --violet:   #6A2BFF;
  --plum:     #B721FF;
  --sun:      #FFB627;
  --tang:     #FF6B4A;
  --mint:     #29D69A;
  --sky:      #00C2FF;
  --ink:      #150428;
  --ink-2:    #2A0F4A;
  --cream:    #FFF4E5;
  --shadow-pop: 0 18px 40px rgba(20,4,40,.25), 0 4px 10px rgba(20,4,40,.18);
  --font-display: 'Bricolage Grotesque','Archivo Black',system-ui,sans-serif;
  --font-body:    'DM Sans',system-ui,sans-serif;
  --font-marker:  'Caveat',cursive;
  --font-mono:    'JetBrains Mono',ui-monospace,monospace;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

html,body {
  height: 100%;
  font-family: var(--font-body);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  background: #0c0010;
}

/* ── Page shell ─────────────────────────────────────── */
.page-bg {
  min-height: 100dvh;
  background:
    radial-gradient(1200px 800px at 80% -10%,#ffd1ec 0%,transparent 60%),
    radial-gradient(900px 700px at -5% 110%,#d6c4ff 0%,transparent 55%),
    linear-gradient(180deg,#F7F0FF 0%,#FFF3E8 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0 28px;
  gap: 0;
}

@media (max-width: 479px) {
  .page-bg {
    padding: 0;
    background: #000;
  }
}

/* ── View toggle ────────────────────────────────────── */
.view-toggle {
  display: flex;
  background: rgba(21,4,40,.08);
  border-radius: 999px;
  padding: 3px;
  margin-bottom: 14px;
  flex-shrink: 0;
}
.view-toggle button {
  border: 0; cursor: pointer;
  background: transparent;
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 700; font-size: 13px;
  padding: 7px 20px; border-radius: 999px;
  transition: all 120ms ease;
  letter-spacing: .02em;
  line-height: 1;
}
.view-toggle button.active {
  background: var(--ink);
  color: var(--sun);
}

@media (max-width: 479px) {
  .view-toggle {
    position: fixed;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    background: rgba(21,4,40,.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.18);
  }
  .view-toggle button { color: rgba(255,255,255,.7); font-size: 12px; padding: 6px 16px; }
  .view-toggle button.active { background: rgba(255,255,255,.18); color: #fff; }
}

/* ── Story outer (accommodates scaled height) ───────── */
.story-outer { position: relative; flex-shrink: 0; }

/* ── Story inner (always 430×932, scaled by JS) ─────── */
.story-inner {
  width: 430px; height: 932px;
  border-radius: 44px; overflow: hidden;
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,.22), 0 0 0 1px rgba(0,0,0,.1);

@media (max-width: 479px) {

}

.story-hint {

  font-family: var(--font-mono);

@media (max-width: 479px) { .story-hint { display: none; } }

.card {
  position: absolute; inset: 0;

  padding: 56px 28px 36px;

  font-size: 12px; letter-spacing: .18em;

/* ── Sticker ────────────────────────────────────────── */
.sticker {
  display: inline-flex; align-items: center; gap: 6px;

  font-weight: 700; font-size: 12px;
  letter-spacing: .08em; text-transform: uppercase;

/* ── CTA buttons ────────────────────────────────────── */
.cta {

.cta:hover { transform: translateY(-1px); }

.cta-light { background:#fff; color:var(--ink); box-shadow:0 2px 0 rgba(0,0,0,.18),0 8px 18px rgba(0,0,0,.18); }
.cta-dark  { background:var(--ink); color:#fff; box-shadow:0 2px 0 rgba(0,0,0,.18),0 8px 18px rgba(0,0,0,.25); }

/* ── Animations ─────────────────────────────────────── */
@keyframes pop-in {
  0%   { transform:scale(.6) rotate(var(--rot,0deg)); opacity:0; }
  60%  { transform:scale(1.08) rotate(var(--rot,0deg)); opacity:1; }
  100% { transform:scale(1) rotate(var(--rot,0deg)); opacity:1; }
}
@keyframes rise {
  0%   { transform:translateY(20px); opacity:0; }
  100% { transform:translateY(0); opacity:1; }
}
@keyframes drift {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-10px); }
}
@keyframes spin-slow { to { transform:rotate(360deg); } }
@keyframes flame-flicker {
  0%,100% { transform:scaleY(1) rotate(-1deg); }
  50%      { transform:scaleY(1.06) rotate(1deg); }
}
@keyframes blink {
  0%,100% { opacity:1; }
  50%      { opacity:.2; }
}

.anim-pop     { animation: pop-in 520ms cubic-bezier(.34,1.56,.64,1) both; }
.anim-rise    { animation: rise 600ms ease-out both; }
.anim-drift   { animation: drift 3.2s ease-in-out infinite; }
.anim-flicker { animation: flame-flicker 1.4s ease-in-out infinite; transform-origin: bottom center; }
.anim-rise.is-ready,.anim-pop.is-ready { opacity:1 !important; }

/* ── Progress bars ──────────────────────────────────── */
.story-progress {
  position:absolute; top:54px; left:0; right:0;
  z-index:30; display:flex; gap:4px; padding:0 14px;
}
.story-progress .seg {
  flex:1; height:3px; border-radius:99px;
  background:rgba(255,255,255,.35); overflow:hidden;
}
.story-progress .seg .fill {

}

/* ── Story header (brand + counter) ─────────────────── */
.story-header {
  position:absolute; top:64px; left:22px; right:22px;

}
.story-header .brand {

}
.story-header .brand-mark {
  width:24px; height:24px; border-radius:7px;
  background:#fff; color:var(--ink);

  font-size:11px; font-weight:900; font-family:var(--font-display);

/* ── Tap zones ──────────────────────────────────────── */
.story-controls {
  position:absolute; inset:0;
  display:grid; grid-template-columns:35% 30% 35%;
  z-index:20;
}
.story-controls > div { cursor:pointer; }
</style>
</head>

const DATA = {

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */
const { useState, useEffect, useRef } = React;

function CountUp({ to, duration = 900, suffix = '', prefix = '', trigger = 0 }) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf, start;
    const tick = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / duration);
      setN(Math.round(to * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [to, duration, trigger]);
  return <span>{prefix}{n.toLocaleString()}{suffix}</span>;
}

function Confetti({ density = 28, seed = 1 }) {
  const rand = (i) => { const s = Math.sin((i+1)*(seed+1)*9.123)*10000; return s-Math.floor(s); };
  const colors = ['#FF2E93','#FFB627','#29D69A','#6A2BFF','#00C2FF','#FF6B4A','#fff'];
  const shapes = ['circle','square','tri','star'];
  const out = [];
  for (let i = 0; i < density; i++) {
    const left = rand(i*2)*100, top = rand(i*2+1)*100;
    const size = 6 + rand(i+99)*10, rot = rand(i+33)*360;
    const color = colors[i%colors.length], shape = shapes[i%shapes.length];
    const delay = rand(i+7)*600;
    let el;
    if (shape==='circle') el=<span style={{width:size,height:size,borderRadius:999,background:color,display:'block'}}/>;
    else if (shape==='square') el=<span style={{width:size,height:size,background:color,display:'block',borderRadius:2}}/>;
    else if (shape==='tri') el=<span style={{width:0,height:0,borderLeft:`${size/2}px solid transparent`,borderRight:`${size/2}px solid transparent`,borderBottom:`${size}px solid ${color}`,display:'block'}}/>;
    else el=<svg width={size+4} height={size+4} viewBox="0 0 24 24"><path fill={color} d="M12 1l2.9 7.6L23 9.7l-6 5.4 1.7 8.1L12 19l-6.7 4.2L7 15.1 1 9.7l8.1-1.1L12 1z"/></svg>;
    out.push(<div key={i} className="anim-pop" style={{position:'absolute',left:`${left}%`,top:`${top}%`,transform:`rotate(${rot}deg)`,'--rot':`${rot}deg`,animationDelay:`${delay}ms`,pointerEvents:'none'}}>{el}</div>);
  }
  return <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:1}}>{out}</div>;
}

function Squiggle({ color = '#150428', width = 80, style }) {
  return (
    <svg viewBox="0 0 100 20" width={width} style={style} fill="none">
      <path d="M2 10 Q 12 0, 24 10 T 48 10 T 72 10 T 96 10" stroke={color} strokeWidth="3" strokeLinecap="round"/>
    </svg>
  );
}

function Star({ size = 24, color = '#FFB627', style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={style}>
      <path fill={color} stroke="#150428" strokeWidth="1.5" strokeLinejoin="round" d="M12 2.5l2.6 6.3 6.8.5-5.2 4.4 1.7 6.6L12 16.7 6.1 20.3 7.8 13.7 2.6 9.3l6.8-.5L12 2.5z"/>
    </svg>
  );
}

function Spark({ size = 18, color = '#fff', style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={style}>
      <path fill={color} d="M12 0 L13.5 9.5 L24 12 L13.5 14.5 L12 24 L10.5 14.5 L0 12 L10.5 9.5 Z"/>
    </svg>
  );
}

// 3 — First Moment
function CardFirstMoment({ active }) {
  const { firstEventName, firstEventShort, firstEventVenue, eventsAttended } = DATA.student;
  return (
    <div className="card" style={{background:'linear-gradient(160deg,#150428 0%,#2A0F4A 100%)',color:'#fff'}}>
      <Spark size={14} color="#FFB627" style={{position:'absolute',top:116,left:50}}/>
      <Spark size={20} color="#FF2E93" style={{position:'absolute',top:156,right:30}}/>
      <Spark size={16} color="#29D69A" style={{position:'absolute',bottom:180,left:30}}/>

      <div style={{position:'absolute',top:108,left:28,right:28}}>
        <div className="eyebrow anim-rise" style={{color:'#FFB627'}}>02 · First Moment</div>

/* ============================================================
   STORY PLAYER
   ============================================================ */
const SLIDE_MS = 6500;

function Story({ cards, idx, setIdx }) {
  const n = cards.length;
  const [paused, setPaused] = useState(false);
  const [progress, setProgress] = useState(0);
  const [autoplay] = useState(false); // set to true for kiosk mode

  useEffect(() => {
    if (!autoplay || paused) return;
    let raf, start;
    const tick = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t-start)/SLIDE_MS);
      setProgress(p);
      if (p >= 1) { if (idx < n-1) setIdx(idx+1); return; }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [idx, paused, autoplay]);

  useEffect(() => { setProgress(0); }, [idx]);

  // Kick stale pending CSS animations (Chrome quirk)
  useEffect(() => {
    const kick = () => {
      document.querySelectorAll('.anim-rise,.anim-pop').forEach(el => {
        el.classList.add('is-ready');
        el.getAnimations && el.getAnimations().forEach(a => {
          if (a.pending) { try { a.startTime = a.timeline?.currentTime ?? 0; } catch(_) { try { a.finish(); } catch(__){} } }
        });
      });
    };
    const t1 = requestAnimationFrame(() => requestAnimationFrame(kick));
    const t2 = setTimeout(kick, 200);
    return () => { cancelAnimationFrame(t1); clearTimeout(t2); };
  }, [idx, cards]);

  const next = () => setIdx(Math.min(n-1, idx+1));
  const prev = () => setIdx(Math.max(0, idx-1));

  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
      if (e.key==='ArrowRight') next();
      if (e.key==='ArrowLeft')  prev();
      if (e.key===' ') { e.preventDefault(); setPaused(p=>!p); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [idx]);

  const Active = cards[idx].Component;

  return (
    <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden',background:'#000'}}>
      {/* Progress bars */}
      <div className="story-progress">
        {cards.map((_,i) => (
          <div className="seg" key={i}>
            <div className="fill" style={{
              width: i<idx?'100%':i===idx?`${progress*100}%`:'0%',
              transition: i===idx?'none':'width 200ms',
            }}/>
          </div>
        ))}
      </div>

      {/* Brand header */}
      <div className="story-header" style={{color:'#fff',mixBlendMode:'difference'}}>
        <div className="brand">
          <span className="brand-mark">J</span>
          <span>JSU Wrapped</span>
        </div>
        <div style={{fontSize:11,fontWeight:600,opacity:.85,fontFamily:'var(--font-mono)'}}>
          {String(idx+1).padStart(2,'0')} / {n}
        </div>
      </div>

      {/* Active card */}
      <div key={cards[idx].key} style={{position:'absolute',inset:0}}>
        <Active active={true}/>
      </div>

      {/* Tap zones */}
      <div className="story-controls">
        <div onClick={prev}/>
        <div
          onMouseDown={()=>setPaused(true)} onMouseUp={()=>setPaused(false)}
          onMouseLeave={()=>setPaused(false)}
          onTouchStart={()=>setPaused(true)} onTouchEnd={()=>setPaused(false)}
        />
        <div onClick={next}/>
      </div>

      {/* Right-edge chevron hint */}
      {idx < n-1 && (
        <div style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',zIndex:22,pointerEvents:'none',animation:'drift 1.6s ease-in-out infinite'}}>
          <div style={{width:32,height:32,borderRadius:999,background:'rgba(255,255,255,.18)',backdropFilter:'blur(10px)',border:'1px solid rgba(255,255,255,.35)',color:'#fff',display:'grid',placeItems:'center',mixBlendMode:'difference'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        </div>
      )}

      {/* Replay button on last card */}
      {idx === n-1 && (
        <div style={{position:'absolute',left:'50%',bottom:6,zIndex:25,transform:'translateX(-50%)'}}>
          <button onClick={()=>setIdx(0)} style={{background:'rgba(255,255,255,.2)',backdropFilter:'blur(10px)',border:'1px solid rgba(255,255,255,.4)',color:'#fff',fontSize:11,fontWeight:700,padding:'6px 14px',borderRadius:999,letterSpacing:'.08em',cursor:'pointer',fontFamily:'var(--font-body)'}}>↺ Replay</button>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   APP  — responsive scale + view toggle
   ============================================================ */
function App() {
  // Read ?view=chapter from URL to set initial view
  const initialView = new URLSearchParams(location.search).get('view') === 'chapter' ? 'chapter' : 'student';
  const [view, setView] = useState(initialView);
  const cards = view==='chapter' ? CARDS_CHAPTER : CARDS_STUDENT;
  const [idx, setIdx] = useState(0);
  const [scale, setScale] = useState(1);
  const toggleRef = useRef(null);

  // Reset slide when switching view
  useEffect(() => { setIdx(0); }, [view]);

  // Responsive scale: fit 430×932 into the available viewport
  useEffect(() => {
    const update = () => {
      const toggleH = toggleRef.current ? toggleRef.current.offsetHeight + 28 : 64;
      const sw = window.innerWidth / 430;
      const sh = (window.innerHeight - toggleH) / 932;
      setScale(Math.min(sw, sh, 1));
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  const scaledW = Math.round(430 * scale);
  const scaledH = Math.round(932 * scale);

  return (
    <div className="page-bg">
      {/* View toggle */}
      <div className="view-toggle" ref={toggleRef}>
        <button className={view==='student'?'active':''} onClick={()=>setView('student')}>My Year</button>
        <button className={view==='chapter'?'active':''} onClick={()=>setView('chapter')}>Our Chapter</button>
      </div>

      {/* Story player, scaled */}
      <div className="story-outer" style={{width:scaledW, height:scaledH}}>
        <div className="story-inner" style={{transform:`scale(${scale})`, transformOrigin:'top left'}}>
          <Story cards={cards} idx={idx} setIdx={setIdx}/>
        </div>
      </div>

      <p className="story-hint">Tap right to advance · Tap left to go back · Hold to pause · ← → Space</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
